server:
  tomcat:
    max-http-form-post-size: 50MB

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  application:
    name: OIPASecurityTool
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    show-sql: true

logging:
  level:
    org.hibernate:
      SQL: DEBUG
      orm:
        jdbc:
          bind: TRACE