spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  application:
    name: OIPASecurityTool
  datasource:
    secondary-dev:
      jdbc-url: jdbc:oracle:thin:@//10.10.3.246:1521/OIPADEVDB
      username: OIPA_PAS
      password: OIPA_PAS
      driver-class-name: oracle.jdbc.OracleDriver
      maximum-pool-size: 30
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    show-sql: true

server:
  port: 8015

logging:
  level:
    org.hibernate:
      SQL: DEBUG
      orm:
        jdbc:
          bind: TRACE